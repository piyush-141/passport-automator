<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>PassportSnap — Privacy-First Passport Photo Generator</title>
    <meta name="description" content="Generate print-ready passport photo sheets entirely in your browser. No uploads, no accounts, no tracking. Your photos never leave your device." />
    <meta name="keywords" content="passport photo, photo generator, privacy, offline, print, PDF, 35x45mm" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="PassportSnap — Privacy-First Passport Photo Generator" />
    <meta property="og:description" content="Create print-ready passport photo PDF sheets in your browser. Zero uploads. Zero tracking." />
    <meta property="og:type" content="website" />

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' blob:;
      script-src 'self' https://fonts.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' blob: data:;
      connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;
      frame-src 'self' blob:;
      worker-src 'self' blob:;
    " />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
